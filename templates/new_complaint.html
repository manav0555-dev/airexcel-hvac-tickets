{% extends "base.html" %}
{% block title %}New Complaint - HVAC Complaint Tracker{% endblock %}

{% block content %}
<div class="page-header">
    <h1>New Complaint</h1>
    <a href="{{ url_for('complaints_list') }}" class="btn btn-secondary">Back to List</a>
</div>

<div class="card">
    <form method="POST">
        <div class="form-row">
            <div class="form-group">
                <label for="title">Title *</label>
                <input type="text" id="title" name="title" class="form-control" required placeholder="Brief complaint summary">
            </div>
            <div class="form-group">
                <label for="category">Category</label>
                <select id="category" name="category" class="form-control">
                    <option value="">Select category...</option>
                    <option value="Installation">Installation</option>
                    <option value="Repair">Repair</option>
                    <option value="Maintenance">Maintenance</option>
                    <option value="Noise/Vibration">Noise/Vibration</option>
                    <option value="Temperature">Temperature</option>
                    <option value="Airflow">Airflow</option>
                    <option value="Leak">Leak</option>
                    <option value="Electrical">Electrical</option>
                    <option value="Billing">Billing</option>
                    <option value="Professionalism">Professionalism</option>
                    <option value="Timeliness">Timeliness</option>
                    <option value="Other">Other</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="description">Description *</label>
            <textarea id="description" name="description" class="form-control" required placeholder="Detailed complaint description..."></textarea>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="customer_name">Customer Name *</label>
                <input type="text" id="customer_name" name="customer_name" class="form-control" required>
            </div>
            <div class="form-group">
                <label for="customer_phone">Customer Phone</label>
                <input type="tel" id="customer_phone" name="customer_phone" class="form-control" placeholder="(555) 123-4567">
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="job_site_id">Job Site</label>
                <select id="job_site_id" name="job_site_id" class="form-control">
                    <option value="">Select site...</option>
                    {% for s in job_sites %}
                    <option value="{{ s['id'] }}">{{ s['name'] }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label for="technician_id">Assign Technician</label>
                <select id="technician_id" name="technician_id" class="form-control">
                    <option value="">Unassigned</option>
                    {% for t in technicians %}
                    <option value="{{ t['id'] }}">{{ t['full_name'] }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="scheduled_date">Scheduled Date &amp; Time (IST)</label>
                <input type="datetime-local" id="scheduled_date" name="scheduled_date" class="form-control">
            </div>
            <div class="form-group">
                <label for="scheduled_end">End Time (IST)</label>
                <input type="datetime-local" id="scheduled_end" name="scheduled_end" class="form-control">
            </div>
        </div>
        <p style="font-size:.85rem; color:var(--gray-500); margin-top:-8px;">
            Setting a technician + schedule will automatically create a job in Odoo Planning.
        </p>

        <div class="form-group">
            <label for="priority">Priority (1 = Critical, 5 = Minimal)</label>
            <select id="priority" name="priority" class="form-control">
                <option value="1">1 - Critical</option>
                <option value="2">2 - High</option>
                <option value="3" selected>3 - Medium</option>
                <option value="4">4 - Low</option>
                <option value="5">5 - Minimal</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Create Complaint</button>
    </form>
</div>
{% endblock %}
